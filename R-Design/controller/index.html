<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Pixel War — Controller</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- ================================================================
         ECRAN 1 : Rejoindre / Se reconnecter
         ================================================================ -->
    <div id="screen-join" class="screen">
      <h1>🎨 Pixel War</h1>

      <div class="form">
        <!-- Nouveau compte -->
        <label for="pseudo">Pseudo</label>
        <input type="text" id="pseudo" placeholder="Ton pseudo..." maxlength="16" autocomplete="off" />
        <button id="btn-join" class="btn-primary">Rejoindre</button>

        <div class="separator">ou</div>

        <!-- Reconnexion -->
        <label for="reconnect-id">Se reconnecter avec mon ID</label>
        <input type="text" id="reconnect-id" placeholder="Ex: AB3K9" maxlength="5" autocomplete="off" />
        <button id="btn-reconnect" class="btn-secondary">Reconnecter</button>

        <!-- Message d'erreur in-game (pas d'alert native) -->
        <div id="join-error" class="error-msg hidden"></div>
      </div>
    </div>

    <!-- ================================================================
         ECRAN 1b : ID reveal — Affiche l'ID apres creation
         ================================================================ -->
    <div id="screen-id-reveal" class="screen hidden">
      <h1>🎉 Bienvenue !</h1>
      <p class="subtitle">Voici ton identifiant unique :</p>
      <div id="reveal-id" class="big-id">-----</div>
      <p class="subtitle muted">Note-le bien ! Il te permettra de te reconnecter.</p>
      <div class="id-actions">
        <button id="btn-copy-id" class="btn-copy">Copier l'ID</button>
        <a id="btn-sms-id" class="btn-sms" href="#">Envoyer par SMS</a>
      </div>
      <button id="btn-continue" class="btn-primary">C'est note, continuer</button>
    </div>

    <!-- ================================================================
         ECRAN 2 : Interface de jeu
         ================================================================ -->
    <div id="screen-game" class="screen hidden">

      <!-- Barre d'info joueur (toujours en haut) -->
      <div class="player-bar">
        <span id="display-pseudo">—</span>
        <span id="display-id" class="player-id" title="Copier l'ID">—</span>
        <span id="display-team" class="badge"><span id="display-team-dot" class="badge-dot hidden"></span><span id="display-team-text">Solo</span></span>
      </div>

      <!-- Tabs (toujours en dessous de la barre joueur) -->
      <div class="tabs">
        <button class="tab active" data-tab="canvas">Canvas</button>
        <button class="tab" data-tab="team">Equipe</button>
      </div>

      <!-- Message d'erreur in-game -->
      <div id="game-error" class="error-msg hidden"></div>

      <!-- ============================================================
           ONGLET CANVAS
           ============================================================ -->
      <div id="tab-canvas" class="tab-content">

        <!-- Canvas avec zoom/pan -->
        <div id="canvas-container">
          <div id="canvas-viewport">
            <canvas id="pixel-canvas"></canvas>
            <!-- Overlay image d'equipe -->
            <img id="overlay-img" class="overlay-img hidden" draggable="false" />
            <!-- Curseur de selection (pixel selectionne) -->
            <div id="pixel-cursor" class="hidden"></div>
          </div>
        </div>

        <!-- Barre d'edition overlay (visible uniquement en mode edition) -->
        <div id="overlay-edit-bar" class="overlay-edit-bar hidden">
          <div class="overlay-edit-scale">
            <button id="btn-overlay-scale-down" class="ctrl-btn">−</button>
            <span class="overlay-edit-label">Taille</span>
            <button id="btn-overlay-scale-up" class="ctrl-btn">+</button>
          </div>
          <div class="overlay-edit-opacity">
            <span class="overlay-edit-label">Opacite</span>
            <input type="range" id="overlay-opacity-slider" min="5" max="90" value="50" />
          </div>
          <div class="overlay-edit-actions">
            <button id="btn-overlay-cancel" class="btn-secondary">Annuler</button>
            <button id="btn-overlay-confirm" class="btn-primary">Confirmer</button>
          </div>
        </div>

        <!-- Controles de zoom + coordonnees -->
        <div class="canvas-controls">
          <button id="btn-zoom-out" class="ctrl-btn">−</button>
          <span id="zoom-level">1x</span>
          <button id="btn-zoom-in" class="ctrl-btn">+</button>
          <span class="spacer"></span>
          <button id="btn-toggle-overlay" class="ctrl-btn hidden" title="Afficher/masquer l'overlay">👁</button>
          <div class="pixel-info">
            <span id="coords-text">—</span>
            <span id="pixel-placer-text" class="pixel-placer hidden"></span>
          </div>
        </div>

        <!-- Palette de couleurs -->
        <div id="palette"></div>

        <!-- Bouton de confirmation -->
        <button id="btn-confirm-pixel" class="btn-confirm hidden" disabled>
          Selectionne un pixel
        </button>

        <!-- Cooldown -->
        <div id="cooldown-bar">
          <div id="cooldown-fill"></div>
          <span id="cooldown-text">Pret !</span>
        </div>
      </div>

      <!-- ============================================================
           ONGLET EQUIPE — VUE GENERALE
           ============================================================ -->
      <div id="tab-team" class="tab-content hidden">

        <!-- Bandeau mon equipe -->
        <div id="my-team-banner" class="my-team-banner">
          <div id="banner-dot" class="banner-dot"></div>
          <div class="my-team-banner-info">
            <span class="my-team-banner-label">Mon équipe</span>
            <span id="banner-name" class="my-team-banner-name">Solo</span>
          </div>
          <span class="my-team-banner-arrow">›</span>
        </div>

        <!-- Creer une equipe (expandable) -->
        <div class="create-team-section">
          <button id="btn-toggle-create" class="btn-toggle-create">+ Creer une equipe</button>
          <div id="create-team-form" class="create-team-form hidden">
            <input type="text" id="team-name" placeholder="Nom de l'equipe" maxlength="24" autocomplete="off" />
            <div id="team-color-picker" class="team-color-picker"></div>
            <button id="btn-create-team" class="btn-primary full-width">Creer</button>
          </div>
        </div>

        <!-- Recherche + liste de toutes les equipes -->
        <div class="search-bar">
          <input type="text" id="team-search" placeholder="Rechercher une equipe..." autocomplete="off" />
        </div>

        <div id="teams-list" class="teams-list">
          <p class="muted">Aucune equipe pour l'instant</p>
        </div>

      </div>

      <!-- ============================================================
           ONGLET EQUIPE — VUE DETAIL
           ============================================================ -->
      <div id="tab-team-detail" class="tab-content hidden">

        <div class="detail-header">
          <button id="btn-back-teams" class="btn-back">← Retour</button>
          <div id="detail-team-dot" class="team-dot-big"></div>
          <div class="detail-title">
            <h3 id="detail-team-name">—</h3>
            <p id="detail-team-stats" class="muted">—</p>
          </div>
        </div>

        <div id="detail-members-list" class="members-list"></div>

        <button id="btn-detail-join" class="btn-primary full-width">Rejoindre</button>
        <button id="btn-detail-leave" class="btn-danger full-width hidden">Quitter l'equipe</button>

        <!-- Section template (visible uniquement pour le leader) -->
        <div id="overlay-section" class="overlay-section hidden">
          <div class="separator">Template</div>
          <div id="overlay-preview-row" class="overlay-preview-row hidden">
            <img id="overlay-thumbnail" class="overlay-thumbnail" />
            <button id="btn-overlay-delete" class="btn-kick">Supprimer</button>
          </div>
          <button id="btn-overlay-add" class="btn-toggle-create">+ Ajouter un template</button>
        </div>

      </div>

      <!-- Input file cache pour import image -->
      <input type="file" id="overlay-file-input" accept="image/*" style="display:none" />

    <!-- ================================================================
         MODAL CROP
         ================================================================ -->
    <div id="modal-crop" class="modal-crop hidden">
      <div class="crop-header">
        <button id="btn-crop-cancel" class="btn-back">Annuler</button>
        <span class="crop-title">Recadrer</span>
        <button id="btn-crop-confirm" class="btn-primary" style="width:auto;padding:0.4rem 1rem;">Appliquer</button>
      </div>
      <div id="crop-area" class="crop-area">
        <img id="crop-img" class="crop-img" draggable="false" />
        <div id="crop-box" class="crop-box">
          <div class="crop-handle crop-handle-tl" data-corner="tl"></div>
          <div class="crop-handle crop-handle-tr" data-corner="tr"></div>
          <div class="crop-handle crop-handle-bl" data-corner="bl"></div>
          <div class="crop-handle crop-handle-br" data-corner="br"></div>
        </div>
      </div>
    </div>

    </div>


    <script src="script.js"></script>
  </body>
</html>
