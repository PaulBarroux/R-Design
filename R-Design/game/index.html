<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel War — Ecran</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- ================================================================
         LEADERBOARD (en haut a gauche)
         Alterne entre classement individuel et par equipe
         ================================================================ -->
    <div id="leaderboard">
      <div class="leaderboard-header">
        <h2 id="leaderboard-title">🏆 Top Joueurs</h2>
        <span id="player-count" class="player-count">0 joueurs</span>
      </div>
      <div id="leaderboard-list"></div>
    </div>

    <!-- ================================================================
         CANVAS PRINCIPAL (centre)
         ================================================================ -->
    <div id="canvas-wrapper">
      <canvas id="pixel-canvas"></canvas>
    </div>

    <!-- ================================================================
         QR CODE (en bas a droite)
         ================================================================ -->
    <div id="qr-box">
      <div id="qr-code"></div>
      <span id="qr-label">Scannez pour jouer</span>
    </div>

    <!-- ================================================================
         EN ATTENTE (affiche quand personne n'est connecte)
         ================================================================ -->
    <div id="waiting">
      <div class="waiting-content">
        <h1>🎨 Pixel War</h1>
        <p>En attente de joueurs...</p>
        <p class="muted">Scannez le QR code pour rejoindre</p>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
